{% extends 'base.html' %}
{% block title %}Register - Blogy{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h2>Create Account</h2>
      <p>Join thousands of writers on Blogy</p>
    </div>
    <div class="form-card">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password1" class="form-control" placeholder="Create a strong password" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="password2" class="form-control" placeholder="Repeat your password" required>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger mb-3">{{ form.errors }}</div>
        {% endif %}
        <button type="submit" class="btn-submit">Create My Account 🎉</button>
      </form>
      <div class="form-divider mt-3">
        Already have an account? <a href="{% url 'login' %}" class="form-link">Login here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
