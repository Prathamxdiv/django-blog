{% extends 'base.html' %}
{% block title %}Login - Blogy{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-icon">👋</div>
      <h2>Welcome Back</h2>
      <p>Login to continue writing and reading</p>
    </div>
    <div class="form-card">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Your username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Your password" required>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger mb-3">Invalid username or password.</div>
        {% endif %}
        <button type="submit" class="btn-submit">Login to Blogy →</button>
      </form>
      <div class="form-divider mt-3">
        <a href="{% url 'password_reset' %}" class="form-link">Forgot password?</a>
      </div>
      <div class="form-divider">
        No account? <a href="{% url 'register' %}" class="form-link">Register for free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
