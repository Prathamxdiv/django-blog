{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 text-center">
        <div class="card p-4 shadow-sm">
          <h4 class="text-danger mb-3">Delete Post</h4>
          <p>Are you sure you want to delete <strong>"{{ post.title }}"</strong>?</p>
          <p class="text-muted small">This action cannot be undone.</p>
          <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete</button>
            <a href="{% url 'post_detail' post.slug %}" class="btn btn-outline-secondary w-100">
              Cancel
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
